AWSTemplateFormatVersion: "2010-09-09"
Description: DEV/PROD Slackbot Infra (Lambda + DynamoDB + S3 + CloudFront)

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]

  ImageTag:
    Type: String
    Description: "ECR image tag e.g. dev-a571a8b"


  FrontendDomain:
    Type: String
    Description: "CloudFront domain (leave blank on first deploy, update after)"
    Default: ""

  SlackClientId:
    Type: String

  SlackClientSecret:
    Type: String
    NoEcho: true

  SlackSigningSecret:
    Type: String
    NoEcho: true

  BedrockModelId:
    Type: String
    Description: "Bedrock Model ID to use (e.g. meta.llama3-1-70b-instruct-v1:0)"
    Default: "meta.llama3-1-70b-instruct-v1:0"


Resources:

  # -------------------------
  # DYNAMODB TABLE
  # -------------------------
  
  MessagesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "${Env}-SlackMessagesV2"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  # -------------------------
  # SESSIONS TABLE (Week 5 – user isolation)
  # -------------------------
  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "${Env}-slackbot-sessions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # -------------------------
  # IAM ROLE FOR LAMBDA
  # -------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Env}-slackbot-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${Env}-slackbot-ecr-read"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/slackbot-api"

        - PolicyName: !Sub "${Env}-slackbot-dynamodb"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt MessagesTable.Arn
                  - !GetAtt SessionsTable.Arn

        - PolicyName: !Sub "${Env}-slackbot-bedrock"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"

        - PolicyName: !Sub "${Env}-slackbot-secrets"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DeleteSecret
                  - secretsmanager:ListSecrets
                Resource: "*"

  # -------------------------
  # LAMBDA FUNCTION
  # -------------------------
  SlackbotFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Env}-slackbot-api"
      PackageType: Image
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 1024
      Code:
        ImageUri: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/slackbot-api:${ImageTag}"
      Environment:
        Variables:
          SECRET_PREFIX: !If [IsProd, "prod-slackbot", "dev-slackbot"]
          DDB_TABLE: !Ref MessagesTable
          UI_BASE_URL: !Sub "https://${FrontendDomain}"
          SLACK_CLIENT_ID: !Ref SlackClientId
          SLACK_CLIENT_SECRET: !Ref SlackClientSecret
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          SLACK_REDIRECT_URI: !Sub "https://${FrontendDomain}/api/oauth/callback"
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          SLACK_SCOPES: "channels:read,groups:read,channels:history,groups:history,im:history,mpim:history,users:read,chat:write,channels:join,app_mentions:read"
          SESSIONS_TABLE: !Ref SessionsTable
          ENV: !Ref Env

  # -------------------------
  # API GATEWAY HTTP API
  # -------------------------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${Env}-slackbot-http-api"
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SlackbotFunction.Arn
      PayloadFormatVersion: "2.0"

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  HttpApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SlackbotFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  # -------------------------
  # S3 BUCKET
  # -------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Env}-slackbot-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # -------------------------
  # CLOUDFRONT ORIGIN ACCESS CONTROL
  # -------------------------
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Env}-slackbot-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # -------------------------
  # CLOUDFRONT DISTRIBUTION
  # -------------------------
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html

        Origins:
          - Id: s3-origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref FrontendOAC

          - Id: apigw-origin
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: ""
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]

        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

        # Route API endpoints to API Gateway
        CacheBehaviors:
          # /api/* routes
          - PathPattern: "/api/*"
            TargetOriginId: apigw-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
                - Origin
                - X-Slack-Request-Timestamp
                - X-Slack-Signature
              Cookies:
                Forward: all

          # /slack/* routes (bot events webhook — must forward Slack headers)
          - PathPattern: "/slack/*"
            TargetOriginId: apigw-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            ForwardedValues:
              QueryString: false
              Headers:
                - Content-Type
                - X-Slack-Request-Timestamp
                - X-Slack-Signature
              Cookies:
                Forward: none
  # BUCKET POLICY
  # -------------------------
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

Conditions:
  IsProd: !Equals [!Ref Env, "prod"]

Outputs:
  LambdaName:
    Value: !Ref SlackbotFunction

  SessionsTableName:
    Value: !Ref SessionsTable

  FrontendBucketName:
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Value: !Ref FrontendDistribution

  CloudFrontDomain:
    Value: !GetAtt FrontendDistribution.DomainName

  DynamoDBTableName:
    Value: !Ref MessagesTable

  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
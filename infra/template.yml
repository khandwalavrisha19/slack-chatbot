AWSTemplateFormatVersion: "2010-09-09"
Description: DEV/PROD Slackbot Infra (Lambda + DynamoDB + S3 + CloudFront)

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
  ImageTag:
    Type: String
  ApiDomain:
    Type: String
  FrontendDomain:
    Type: String
    Default: ""
  SlackClientId:
    Type: String
  SlackClientSecret:
    Type: String
    NoEcho: true
  SlackSigningSecret:
    Type: String
    NoEcho: true
  GroqApiKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  MessagesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "${Env}-SlackMessagesV2"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Env}-slackbot-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${Env}-slackbot-dynamodb"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:GetItem, dynamodb:Query, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:Scan]
                Resource: !GetAtt MessagesTable.Arn
        - PolicyName: !Sub "${Env}-slackbot-secrets"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue, secretsmanager:CreateSecret, secretsmanager:PutSecretValue, secretsmanager:DeleteSecret, secretsmanager:ListSecrets]
                Resource: "*"

  SlackbotFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Env}-slackbot-api"
      PackageType: Image
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 1024
      Code:
        ImageUri: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/slackbot-api:${ImageTag}"
      Environment:
        Variables:
          SECRET_PREFIX: !If [IsProd, "prod-slackbot", "dev-slackbot"]
          DDB_TABLE: !Ref MessagesTable
          UI_BASE_URL: !Sub "https://${FrontendDomain}"
          SLACK_CLIENT_ID: !Ref SlackClientId
          SLACK_CLIENT_SECRET: !Ref SlackClientSecret
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          SLACK_REDIRECT_URI: !Sub "https://${FrontendDomain}/api/oauth/callback"
          GROQ_API_KEY: !Ref GroqApiKey
          SLACK_SCOPES: "channels:read,groups:read,channels:history,groups:history,users:read,chat:write,channels:join"

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Env}-slackbot-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Env}-slackbot-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: s3-origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref FrontendOAC
          - Id: apigw-origin
            DomainName: !Ref ApiDomain
            OriginPath: ""
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CacheBehaviors:
          - PathPattern: "/api/*"
            TargetOriginId: apigw-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # Managed-CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac   # Managed-AllViewerExceptHostHeader
          - PathPattern: "/index.html"
            TargetOriginId: s3-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf   # Managed-CORS-S3Origin

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

Conditions:
  IsProd: !Equals [!Ref Env, "prod"]

Outputs:
  LambdaName:
    Value: !Ref SlackbotFunction
  FrontendBucketName:
    Value: !Ref FrontendBucket
  CloudFrontDistributionId:
    Value: !Ref FrontendDistribution
  CloudFrontDomain:
    Value: !GetAtt FrontendDistribution.DomainName
  DynamoDBTableName:
    Value: !Ref MessagesTable

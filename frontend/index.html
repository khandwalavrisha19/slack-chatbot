<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slack Chatbot Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#eef0f7; --surface:#f7f5fc; --surface2:#ece9f5; --border:rgba(140,120,200,.13); --border-hover:rgba(140,120,200,.24); --text:#2c2840; --text-muted:#a49dbf; --text-soft:#7b73a0; --accent:#9b7fe8; --accent-glow:rgba(155,127,232,.14); --danger:#e07a8a; --danger-bg:rgba(224,122,138,.09); --radius:10px; --radius-sm:6px; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.5; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 40% at 15% 10%, rgba(185,160,245,.18) 0%, transparent 65%), radial-gradient(ellipse 50% 40% at 85% 80%, rgba(130,210,190,.13) 0%, transparent 65%), radial-gradient(ellipse 40% 30% at 70% 20%, rgba(245,170,185,.10) 0%, transparent 60%); pointer-events:none; z-index:0; }
    header { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:56px; background:rgba(238,240,247,.85); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .header-left { display:flex; align-items:center; gap:10px; }
    .logo-icon { width:26px; height:26px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; }
    h1 { font-size:14px; font-weight:500; }
    .pill { font-size:11px; font-family:'DM Mono',monospace; font-weight:500; padding:4px 10px; border-radius:999px; border:1px solid var(--border); background:var(--surface); color:var(--text-soft); }
    .pill.ok { color:#3d9e7e; } .pill.warn { color:#9e7820; } .pill.err { color:var(--danger); }
    .wrap { position:relative; z-index:1; display:grid; grid-template-columns:360px 1fr; gap:16px; padding:20px 24px; max-width:1200px; margin:0 auto; }
    .sidebar { display:flex; flex-direction:column; gap:10px; }
    .panel, .output-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .panel-header, .output-header { display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border); }
    .output-header { justify-content:space-between; }
    .step-badge { font-size:10px; font-family:'DM Mono',monospace; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 6px; }
    .panel-title, .output-title { font-size:12px; font-weight:600; color:var(--text-soft); letter-spacing:.04em; text-transform:uppercase; }
    .panel-body { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
    .hint { font-size:12px; color:var(--text-muted); }
    label { display:block; font-size:11px; font-weight:500; color:var(--text-muted); letter-spacing:.04em; text-transform:uppercase; margin-bottom:5px; }
    input, select, textarea { width:100%; padding:9px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; }
    .btn-group { display:flex; flex-wrap:wrap; gap:6px; }
    button { padding:7px 13px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:var(--text-soft); cursor:pointer; font-size:12px; font-weight:500; }
    button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    button.danger { color:var(--danger); background:transparent; border-color:rgba(224,122,138,.25); }
    .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .output-panel { position:sticky; top:76px; height:calc(100vh - 96px); display:flex; flex-direction:column; }
    .output-body { flex:1; overflow-y:auto; padding:14px 16px; }
    pre { font-family:'DM Mono',monospace; font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
    .status-bar.ok { color:#3d9e7e; } .status-bar.warn { color:#9e7820; } .status-bar.err { color:var(--danger); }
    @media (max-width:900px){ .wrap{grid-template-columns:1fr;} .output-panel{position:static;height:auto;min-height:300px;} }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-icon"></div>
    <h1>Slack Chatbot Dashboard</h1>
  </div>
  <span class="pill" id="pill">Idle</span>
</header>
<div class="wrap">
  <div class="sidebar">
    <div class="panel">
      <div class="panel-header"><span class="step-badge">01</span><span class="panel-title">Connect</span></div>
      <div class="panel-body">
        <p class="hint">Connect a Slack workspace via OAuth. The workspace list updates automatically.</p>
        <div class="btn-group">
          <button class="primary" onclick="connectSlack()">Connect Slack</button>
          <button onclick="refreshNow()">Refresh</button>
        </div>
        <div>
          <label>Workspace</label>
          <select id="workspaceSelect" onchange="loadChannels()"><option value="">— No workspaces loaded —</option></select>
        </div>
        <div class="btn-group">
          <button onclick="loadWorkspaces()">Load Workspaces</button>
          <button onclick="checkToken()">Token Status</button>
          <button class="danger" onclick="disconnectWorkspace()">Disconnect</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="step-badge">02</span><span class="panel-title">Channel</span></div>
      <div class="panel-body">
        <div><label>Channel</label><select id="channelSelect"><option value="">— Load channels first —</option></select></div>
        <div class="btn-group">
          <button onclick="joinSelectedAndBackfill()">Join + Backfill</button>
          <button onclick="joinAllAndBackfill()">Join All Public</button>
          <button onclick="loadMessagesFromDB()">Load from DB</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="step-badge">03</span><span class="panel-title">Search Messages</span></div>
      <div class="panel-body">
        <div><label>Keyword</label><input id="keyword" placeholder="e.g. deployment error" /></div>
        <div class="row-2"><div><label>From</label><input id="fromDate" type="date" /></div><div><label>To</label><input id="toDate" type="date" /></div></div>
        <div><label>User ID</label><input id="searchUserId" placeholder="e.g. U012AB3CD" /></div>
        <div class="btn-group"><button class="primary" onclick="searchMessages()">Search</button><button onclick="clearSearch()">Clear</button></div>
      </div>
    </div>
  </div>
  <div class="output-panel">
    <div class="output-header"><span class="output-title">Output</span><span class="status-bar" id="status">Idle</span></div>
    <div class="output-body"><pre id="out">{}</pre></div>
  </div>
</div>
<script>
  let oauthPopup = null;

  function getApiBase(){ return window.location.origin + "/api"; }
  function bust(url){ return url + (url.includes("?") ? "&" : "?") + "_ts=" + Date.now(); }
  function setStatus(msg, type){ const s=document.getElementById("status"); const p=document.getElementById("pill"); s.textContent=msg; s.className="status-bar" + (type?" "+type:""); p.textContent=msg.length>24?msg.slice(0,24)+"…":msg; p.className="pill" + (type?" "+type:""); }
  function show(obj){ document.getElementById("out").textContent = JSON.stringify(obj, null, 2); }
  async function safeJson(r){ const text = await r.text(); try { return JSON.parse(text); } catch { return {ok:false, raw:text, status:r.status}; } }

  async function fetchJson(url, options){
    const res = await fetch(bust(url), Object.assign({ cache:"no-store", credentials:"omit" }, options || {}));
    return safeJson(res);
  }

  async function refreshNow(){ await loadWorkspaces(); }

  async function loadWorkspaces(preferredTeamId=""){
    try{
      setStatus("Loading workspaces…");
      const data = await fetchJson(getApiBase() + "/workspaces");
      show(data);
      const sel = document.getElementById("workspaceSelect");
      const channelSel = document.getElementById("channelSelect");
      sel.innerHTML = "";
      channelSel.innerHTML = '<option value="">— Load channels first —</option>';
      if (!data.ok) {
        sel.innerHTML = '<option value="">— failed to load workspaces —</option>';
        setStatus("Workspaces load failed", "err");
        return;
      }
      const list = data.workspaces || [];
      if (!list.length) {
        sel.innerHTML = '<option value="">— none connected yet —</option>';
        setStatus("No workspaces connected", "warn");
        return;
      }
      let chosen = false;
      list.forEach((w, idx) => {
        const opt = document.createElement("option");
        opt.value = w.team_id;
        opt.textContent = w.team_id + (w.team_name ? (" • " + w.team_name) : "");
        if ((preferredTeamId && w.team_id === preferredTeamId) || (!preferredTeamId && idx === 0)) { opt.selected = true; chosen = true; }
        sel.appendChild(opt);
      });
      if (!chosen && sel.options.length > 0) sel.selectedIndex = 0;
      setStatus("Workspaces loaded", "ok");
      if (sel.value) await loadChannels();
    }catch(e){ show({ok:false, error:String(e)}); setStatus("Workspaces load failed", "err"); }
  }

  function connectSlack(){
    setStatus("Opening Slack OAuth…");
    oauthPopup = window.open(getApiBase() + "/install", "slack_oauth_popup", "width=700,height=800,menubar=no,toolbar=no,location=yes,resizable=yes,scrollbars=yes,status=no");
    if (!oauthPopup) setStatus("Popup blocked", "err");
  }

  window.addEventListener("message", async (event) => {
    const data = event.data || {};
    if (data.type === "slack_oauth_success") {
      setStatus("Workspace connected", "ok");
      await loadWorkspaces(data.team_id || "");
    } else if (data.type === "slack_oauth_error") {
      show({ok:false, oauth_error:data.error});
      setStatus("Slack connect failed", "err");
    }
  });

  async function checkToken(){
    const team_id = document.getElementById("workspaceSelect").value;
    if(!team_id){ setStatus("Select a workspace first", "warn"); return; }
    setStatus("Checking token…");
    const data = await fetchJson(getApiBase() + "/token/status?team_id=" + encodeURIComponent(team_id));
    show(data);
    setStatus(data.ok && data.has_token ? "Token OK" : "Token missing", data.ok && data.has_token ? "ok" : "warn");
  }

  async function loadChannels(){
    const team_id = document.getElementById("workspaceSelect").value;
    const sel = document.getElementById("channelSelect");
    if(!team_id){ sel.innerHTML = '<option value="">— Load channels first —</option>'; return; }
    setStatus("Loading channels…");
    const data = await fetchJson(getApiBase() + "/channels?team_id=" + encodeURIComponent(team_id));
    show(data);
    sel.innerHTML = "";
    if (!data.ok) { sel.innerHTML = '<option value="">— failed to load channels —</option>'; setStatus("Channels load failed", "err"); return; }
    const channels = data.channels || [];
    if (!channels.length) { sel.innerHTML = '<option value="">— no channels returned —</option>'; setStatus("No channels", "warn"); return; }
    channels.forEach(c => { const opt=document.createElement("option"); opt.value=c.id; opt.textContent="#" + c.name; sel.appendChild(opt); });
    setStatus("Channels loaded", "ok");
  }

  async function backfillOneChannel(team_id, channel_id){
    let cursor = "", totalStored = 0;
    while (true){
      const url = getApiBase() + "/backfill-channel?team_id=" + encodeURIComponent(team_id) + "&channel_id=" + encodeURIComponent(channel_id) + "&limit=200" + (cursor ? "&cursor=" + encodeURIComponent(cursor) : "");
      const data = await fetchJson(url, { method:"POST" });
      if (!data.ok) return { ok:false, error:data };
      totalStored += (data.stored_new || 0);
      if (!data.has_more) break;
      cursor = data.next_cursor || "";
      await new Promise(res => setTimeout(res, 350));
    }
    return { ok:true, stored: totalStored };
  }

  async function joinSelectedAndBackfill(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      const channel_id = document.getElementById("channelSelect").value;
      if(!team_id || !channel_id){ setStatus("Select workspace + channel first", "warn"); return; }
      setStatus("Joining channel…");
      const j = await fetchJson(getApiBase() + "/join-channel?team_id=" + encodeURIComponent(team_id) + "&channel_id=" + encodeURIComponent(channel_id), { method:"POST" });
      if(!j.ok){ show(j); setStatus("Join failed", "err"); return; }
      setStatus("Backfilling…");
      const bf = await backfillOneChannel(team_id, channel_id);
      show({ join:j, backfill:bf });
      setStatus(bf.ok ? ("Done — " + bf.stored + " stored") : "Backfill failed", bf.ok ? "ok" : "err");
    }catch(e){ show({ok:false, error:String(e)}); setStatus("Failed", "err"); }
  }

  async function joinAllAndBackfill(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      if(!team_id){ setStatus("Select a workspace first", "warn"); return; }
      setStatus("Joining all public channels…");
      const j = await fetchJson(getApiBase() + "/join-all-public?team_id=" + encodeURIComponent(team_id), { method:"POST" });
      if(!j.ok){ show(j); setStatus("Join-all failed", "err"); return; }
      await loadChannels();
      const channelIds = Array.from(document.getElementById("channelSelect").options).map(o => o.value).filter(Boolean);
      if(!channelIds.length){ show(j); setStatus("No channels loaded", "warn"); return; }
      let total = 0, results = [];
      for (let i = 0; i < channelIds.length; i++){
        setStatus(`Backfilling ${i+1}/${channelIds.length}…`);
        const bf = await backfillOneChannel(team_id, channelIds[i]);
        results.push({ channel: channelIds[i], ...bf });
        if (bf.ok) total += bf.stored;
        await new Promise(res => setTimeout(res, 400));
      }
      show({ join_all:j, backfill_all:{ total_stored: total, results } });
      setStatus("Done — " + total + " total stored", "ok");
    }catch(e){ show({ok:false, error:String(e)}); setStatus("Failed", "err"); }
  }

  async function loadMessagesFromDB(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      const channel_id = document.getElementById("channelSelect").value;
      if(!team_id || !channel_id){ setStatus("Select workspace + channel first", "warn"); return; }
      setStatus("Loading from DB…");
      const data = await fetchJson(getApiBase() + "/db-messages?team_id=" + encodeURIComponent(team_id) + "&channel_id=" + encodeURIComponent(channel_id) + "&limit=50");
      show(data);
      setStatus(data.ok ? "Loaded from DB" : "DB load failed", data.ok ? "ok" : "err");
    }catch(e){ show({ok:false, error:String(e)}); setStatus("DB load failed", "err"); }
  }

  async function disconnectWorkspace(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      const workspaceSel = document.getElementById("workspaceSelect");
      const channelSel = document.getElementById("channelSelect");
      if(!team_id){ setStatus("Select a workspace first", "warn"); return; }
      if(!confirm("Disconnect this workspace? This will revoke the token and delete the secret.")) return;
      setStatus("Disconnecting…");
      const data = await fetchJson(getApiBase() + "/workspaces/" + encodeURIComponent(team_id), { method:"DELETE" });
      show(data);
      if (!data.ok) { setStatus("Disconnect failed", "err"); return; }
      workspaceSel.innerHTML = '<option value="">— none connected yet —</option>';
      channelSel.innerHTML = '<option value="">— Load channels first —</option>';
      setStatus("Disconnected", "ok");
      await loadWorkspaces();
    }catch(e){ show({ok:false, error:String(e)}); setStatus("Disconnect failed", "err"); }
  }

  async function searchMessages(){
    try {
      const team_id = document.getElementById("workspaceSelect").value;
      const channel_id = document.getElementById("channelSelect").value;
      if (!team_id || !channel_id) { setStatus("Select workspace + channel first", "warn"); return; }
      const q = document.getElementById("keyword").value.trim();
      const from = document.getElementById("fromDate").value;
      const to = document.getElementById("toDate").value;
      const user_id = document.getElementById("searchUserId").value.trim();
      let url = getApiBase() + "/search?team_id=" + encodeURIComponent(team_id) + "&channel_id=" + encodeURIComponent(channel_id);
      if (q) url += "&q=" + encodeURIComponent(q);
      if (from) url += "&from=" + encodeURIComponent(from);
      if (to) url += "&to=" + encodeURIComponent(to);
      if (user_id) url += "&user_id=" + encodeURIComponent(user_id);
      setStatus("Searching…");
      const data = await fetchJson(url);
      show(data);
      const n = data.count || 0;
      setStatus(data.ok ? (n > 0 ? `Found ${n} message${n===1?"":"s"}` : "No results found") : "Search failed", data.ok ? (n > 0 ? "ok" : "warn") : "err");
    } catch(e) {
      show({ ok:false, error: String(e) });
      setStatus("Search error", "err");
    }
  }

  function clearSearch(){
    document.getElementById("keyword").value = "";
    document.getElementById("fromDate").value = "";
    document.getElementById("toDate").value = "";
    document.getElementById("searchUserId").value = "";
    show({});
    setStatus("Cleared");
  }

  loadWorkspaces();
</script>
</body>
</html>
